<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Brighter Blue Gradient (20% brighter than before) -->
    <linearGradient id="blue-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D7FB4" />
      <stop offset="100%" stop-color="#1A4D73" />
    </linearGradient>

    <!-- Glass Lens Radial Glow -->
    <radialGradient id="lens-glow" cx="256" cy="270" r="72" fx="236" fy="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45" />
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.15" />
    </radialGradient>

    <!-- Clip Path for Zoom/Magnification Effect -->
    <clipPath id="lens-clip">
      <circle cx="256" cy="270" r="72" />
    </clipPath>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#blue-grad)" />

  <!-- 1. Document Icon (Unmagnified Background Layer) -->
  <!-- Page Outline -->
  <path d="M 136, 120 H 320 L 376, 176 V 400 H 136 Z" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round" fill="none" />
  <!-- Folded Corner Outline -->
  <path d="M 320, 120 V 176 H 376" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round" fill="none" />
  
  <!-- Standard Page Lines -->
  <line x1="176" y1="220" x2="336" y2="220" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.5" />
  <line x1="176" y1="260" x2="336" y2="260" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.5" />
  <line x1="176" y1="300" x2="336" y2="300" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.5" />
  <line x1="176" y1="340" x2="336" y2="340" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.5" />

  <!-- 2. Magnified Content Layer (Clipped to Lens Circle) -->
  <g clip-path="url(#lens-clip)">
    <!-- Base background for the magnified circle -->
    <circle cx="256" cy="270" r="72" fill="url(#blue-grad)" />
    <!-- Magnified border of the document -->
    <path d="M 136, 120 H 320 L 376, 176 V 400 H 136 Z" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" fill="none" />
    <!-- Magnified lines (thicker and wider) -->
    <line x1="166" y1="210" x2="346" y2="210" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" />
    <line x1="166" y1="270" x2="346" y2="270" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" />
    <line x1="166" y1="330" x2="346" y2="330" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" />
  </g>

  <!-- 3. Magnifying Glass Lens Frame and Handle (Top Layer) -->
  <!-- Handle -->
  <line x1="312" y1="326" x2="372" y2="386" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" />
  <!-- Metal Connector Ring on Handle -->
  <line x1="312" y1="326" x2="327" y2="341" stroke="#D1D5DB" stroke-width="20" stroke-linecap="round" />
  <!-- Glass Lens Frame/Rim -->
  <circle cx="256" cy="270" r="72" stroke="#FFFFFF" stroke-width="16" fill="url(#lens-glow)" />
  <!-- Gloss highlight on glass lens -->
  <path d="M 215, 240 A 50 50 0 0 1 265, 210" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6" />
</svg>